    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var rControl = null;
            var pts = [];
            
            // 좌측 상단 주소 검색창 UI 배치
            var searchBox = L.control({position: 'topleft'});
            searchBox.onAdd = function() {
                var div = L.DomUtil.create('div', 'address-search-box');
                div.innerHTML = `
                    <div style="background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Malgun Gothic', sans-serif; width: 260px; z-index: 99999; position: relative;">
                        <h4 style="margin: 0 0 8px 0; color: #2c3e50; font-size: 14px; font-weight: bold;">🛡️ 미추홀구 안전 내비게이션</h4>
                        <input type="text" id="start-addr" placeholder="출발지 주소 입력" style="width: 100%; padding: 7px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <input type="text" id="end-addr" placeholder="도착지 주소 입력" style="width: 100%; padding: 7px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <button id="search-route-btn" style="width: 100%; padding: 8px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">📍 안전 최단경로 탐색</button>
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                return div;
            };
            searchBox.addTo(map);

            // 경로 선을 그리고 화면을 가득 채워 확대하는 함수
            function updateRoute() {
                if (pts.length === 2) {
                    if (rControl) { map.removeControl(rControl); }
                    rControl = L.Routing.control({
                        waypoints: pts,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{color: '#2980b9', opacity: 0.8, weight: 6}] },
                        addWaypoints: false, draggableWaypoints: false, show: true
                    }).addTo(map);

                    // 경로선이 화면 한눈에 꽉 차도록 확대 자동조정
                    var bounds = L.latLngBounds(pts);
                    map.fitBounds(bounds, { padding: [60, 60] });
                }
            }

            // 외부 플러그인 없이 다이렉트로 주소를 찾아내는 안전한 비동기 함수
            function searchLocation(address, callback) {
                // 한국 주소 인식률 향상을 위해 '인천 미추홀구'를 접두어로 자동 조합
                var fullAddr = "인천 미추홀구 " + address;
                var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(fullAddr);
                
                fetch(url)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data && data.length > 0) {
                            callback(L.latLng(data[0].lat, data[0].lon));
                        } else {
                            callback(null);
                        }
                    })
                    .catch(function() { callback(null); });
            }

            // 버튼 클릭 작동 엔진
            document.getElementById('search-route-btn').addEventListener('click', function() {
                var startText = document.getElementById('start-addr').value.strip;
                var endText = document.getElementById('end-addr').value.strip;
                
                if(!document.getElementById('start-addr').value || !document.getElementById('end-addr').value) { 
                    alert('출발지와 도착지 주소를 모두 입력해주세요!'); 
                    return; 
                }
                
                pts = [];
                
                searchLocation(document.getElementById('start-addr').value, function(startLatLng) {
                    if (startLatLng) {
                        pts[0] = startLatLng;
                        searchLocation(document.getElementById('end-addr').value, function(endLatLng) {
                            if (endLatLng) {
                                pts[1] = endLatLng;
                                updateRoute();
                            } else { alert('도착지 주소를 찾지 못했습니다. 정확한 명칭이나 도로명으로 입력해 주세요.'); }
                        });
                    } else { alert('출발지 주소를 찾지 못했습니다. 정확한 명칭이나 도로명으로 입력해 주세요.'); }
                });
            });

            // 마우스 클릭 시에도 경로 선 연결 및 자동 화면 맞춤 확대 연동
            map.on('click', function(e) {
                if (pts.length >= 2) { pts = []; if (rControl) map.removeControl(rControl); }
                pts.push(e.latlng);
                updateRoute();
            });
        }
    });
    </script>
