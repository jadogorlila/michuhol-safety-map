    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var rControl = null;
            var inst = L.control({position: 'topright'});
            inst.onAdd = function() {
                var d = L.DomUtil.create('div');
                d.innerHTML = "<div style='background:white; padding:10px; border-radius:5px; box-shadow:0 0 15px rgba(0,0,0,0.2); font-family:sans-serif; font-size:12px;'><b>🗺️ 안전 내비게이션 시연 방법</b><br>1. 지도 위 <b>출발지</b> 클릭<br>2. 지도 위 <b>도착지</b> 클릭<br>※ 안전 경로 실시간 탐색 완료</div>";
                return d;
            };
            inst.addTo(map);
            var pts = [];
            map.on('click', function(e) {
                if (pts.length >= 2) { pts = []; if (rControl) map.removeControl(rControl); }
                pts.push(e.latlng);
                if (pts.length === 2) {
                    rControl = L.Routing.control({
                        waypoints: pts,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{color: '#3498db', opacity: 0.8, weight: 6}] },
                        addWaypoints: false, draggableWaypoints: false, show: true
                    }).addTo(map);
                }
            });
        }
    });
    </script>
