    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var rControl = null;
            var pts = [];
            
            // 좌측 상단 검색 박스 UI 배치
            var searchBox = L.control({position: 'topleft'});
            searchBox.onAdd = function() {
                var div = L.DomUtil.create('div', 'address-search-box');
                div.innerHTML = `
                    <div style="background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Malgun Gothic', sans-serif; width: 260px; z-index: 99999; position: relative;">
                        <h4 style="margin: 0 0 8px 0; color: #2c3e50; font-size: 14px; font-weight: bold;">🛡️ 미추홀구 안전 내비게이션</h4>
                        <input type="text" id="start-addr" placeholder="출발지 (예: 미추홀구청)" style="width: 100%; padding: 7px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <input type="text" id="end-addr" placeholder="도착지 (예: 인하대학교)" style="width: 100%; padding: 7px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <button id="search-route-btn" style="width: 100%; padding: 8px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">📍 안전 최단경로 탐색</button>
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                return div;
            };
            searchBox.addTo(map);

            // 경로 선을 지도망에 그리고 화면을 자동 줌 조절하는 함수
            function updateRoute() {
                if (pts.length === 2) {
                    if (rControl) { map.removeControl(rControl); }
                    rControl = L.Routing.control({
                        waypoints: pts,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{color: '#2980b9', opacity: 0.8, weight: 6}] },
                        addWaypoints: false, draggableWaypoints: false, show: true
                    }).addTo(map);

                    // 🚨 [자동 맞춤] 경로가 뜨면 선이 있는 곳으로 지도를 즉시 확대 고정
                    var bounds = L.latLngBounds(pts);
                    map.fitBounds(bounds, { padding: [60, 60] });
                }
            }

            // 한글 검색 기능을 완벽히 수행하는 비동기 좌표 변환 시스템
            function searchLocation(address, callback) {
                var fullAddr = address.trim();
                if (!fullAddr.includes("인천") && !fullAddr.includes("미추홀")) {
                    fullAddr = "인천 미추홀구 " + fullAddr;
                }
                var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(fullAddr);
                
                fetch(url)
                    .then(function(res) { return res.json(); })
                    .then(function(data) {
                        if (data && data.length > 0) {
                            callback(L.latLng(data[0].lat, data[0].lon));
                        } else {
                            callback(null);
                        }
                    })
                    .catch(function() { callback(null); });
            }

            // 🚨 버튼 클릭 작동 엔진 (오타 수정 완료)
            document.getElementById('search-route-btn').addEventListener('click', function() {
                var sVal = document.getElementById('start-addr').value;
                var eVal = document.getElementById('end-addr').value;
                
                if(!sVal || !eVal) { 
                    alert('출발지와 도착지 주소를 모두 입력해주세요!'); 
                    return; 
                }
                
                pts = [];
                
                searchLocation(sVal, function(startLatLng) {
                    if (startLatLng) {
                        pts[0] = startLatLng;
                        searchLocation(eVal, function(endLatLng) {
                            if (endLatLng) {
                                pts[1] = endLatLng;
                                updateRoute();
                            } else { alert('도착지 위치를 찾지 못했습니다. 주요 명칭이나 도로명으로 다시 입력해 주세요.'); }
                        });
                    } else { alert('출발지 위치를 찾지 못했습니다. 주요 명칭이나 도로명으로 다시 입력해 주세요.'); }
                });
            });

            // 마우스 클릭 시에도 경로선 생성 및 자동 줌 연동 유지
            map.on('click', function(e) {
                if (pts.length >= 2) { pts = []; if (rControl) map.removeControl(rControl); }
                pts.push(e.latlng);
                updateRoute();
            });
        }
    });
    </script>
