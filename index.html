    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var rControl = null;
            var pts = [];
            
            // 왼쪽 상단 디자인 레이아웃 정의
            var searchBox = L.control({position: 'topleft'});
            searchBox.onAdd = function() {
                var div = L.DomUtil.create('div', 'address-search-box');
                div.innerHTML = `
                    <div style="background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Malgun Gothic', sans-serif; width: 260px; z-index: 9999; position: relative;">
                        <h4 style="margin: 0 0 8px 0; color: #2c3e50; font-size: 14px; font-weight: bold;">🛡️ 미추홀구 안전 내비게이션</h4>
                        <input type="text" id="start-addr" placeholder="출발지 (예: 미추홀구 독배로 311)" style="width: 100%; padding: 7px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <input type="text" id="end-addr" placeholder="도착지 (예: 미추홀구청)" style="width: 100%; padding: 7px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <button id="search-route-btn" style="width: 100%; padding: 8px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">📍 안전 최단경로 탐색</button>
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                return div;
            };
            searchBox.addTo(map);

            // 🚨 한국 내 개방형 주소 API 검색 처리 함수
            function k-geocode(query, callback) {
                var url = "https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(query + " 인천 미추홀구");
                fetch(url)
                    .then(res => res.json())
                    .then(data => {
                        if(data && data.length > 0) {
                            callback(L.latLng(data[0].lat, data[0].lon));
                        } else {
                            callback(null);
                        }
                    }).catch(() => callback(null));
            }

            function updateRoute() {
                if (pts.length === 2) {
                    if (rControl) { map.removeControl(rControl); }
                    rControl = L.Routing.control({
                        waypoints: pts,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{color: '#2980b9', opacity: 0.8, weight: 6}] },
                        addWaypoints: false, draggableWaypoints: false, show: true
                    }).addTo(map);

                    // 🚨 [조장님 핵심 요청] 출발지와 도착지 선을 한눈에 볼 수 있도록 화면 자동 맞춤(확대) 기능
                    var bounds = L.latLngBounds(pts);
                    map.fitBounds(bounds, { padding: [50, 50] });
                }
            }

            document.getElementById('search-route-btn').addEventListener('click', function() {
                var startText = document.getElementById('start-addr').value;
                var endText = document.getElementById('end-addr').value;
                if(!startText || !endText) { alert('출발지와 도착지 주소를 모두 입력해주세요!'); return; }
                
                k-geocode(startText, function(startLatLng) {
                    if (startLatLng) {
                        pts[0] = startLatLng;
                        k-geocode(endText, function(endLatLng) {
                            if (endLatLng) {
                                pts[1] = endLatLng;
                                updateRoute();
                            } else { alert('도착지 위치를 찾을 수 없습니다. 도로명 주소나 주요 건물명으로 적어주세요.'); }
                        });
                    } else { alert('출발지 위치를 찾을 수 없습니다. 도로명 주소나 주요 건물명으로 적어주세요.'); }
                });
            });

            map.on('click', function(e) {
                if (pts.length >= 2) { pts = []; if (rControl) map.removeControl(rControl); }
                pts.push(e.latlng);
                updateRoute();
            });
        }
    });
    </script>
