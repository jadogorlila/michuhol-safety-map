    <script>
    window.addEventListener("load", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var rControl = null;
            var pts = [];
            
            // 미추홀구 핵심 거점 딕셔너리
            var localDatabase = {
                "미추홀구청": L.latLng(37.4634, 126.6510),
                "인하대학교": L.latLng(37.4500, 126.6550),
                "인하대": L.latLng(37.4500, 126.6550),
                "인하대역": L.latLng(37.4485, 126.6493),
                "주안역": L.latLng(37.4649, 126.6797),
                "숭의역": L.latLng(37.4607, 126.6382),
                "제물포역": L.latLng(37.4667, 126.6567),
                "미추홀경찰서": L.latLng(37.4475, 126.6741),
                "인천지방법원": L.latLng(37.4376, 126.6547)
            };
            
            // 좌측 상단 검색 UI 박스 배치
            var searchBox = L.control({position: 'topleft'});
            searchBox.onAdd = function() {
                var div = L.DomUtil.create('div', 'address-search-box');
                div.innerHTML = `
                    <div style="background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Malgun Gothic', sans-serif; width: 260px; z-index: 99999; position: relative;">
                        <h4 style="margin: 0 0 8px 0; color: #2c3e50; font-size: 14px; font-weight: bold;">🛡️ 미추홀구 안전 내비게이션</h4>
                        <input type="text" id="start-addr" placeholder="출발지 (예: 미추홀구청)" style="width: 100%; padding: 7px; margin-bottom: 6px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <input type="text" id="end-addr" placeholder="도착지 (예: 인하대학교)" style="width: 100%; padding: 7px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
                        <button type="button" id="search-route-btn" style="width: 100%; padding: 8px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">📍 안전 최단경로 탐색</button>
                    </div>
                `;
                L.DomEvent.disableClickPropagation(div);
                return div;
            };
            searchBox.addTo(map);

            // 경로 갱신 및 지도 자동 확대 함수
            function updateRoute() {
                if (pts.length === 2) {
                    if (rControl) { map.removeControl(rControl); }
                    
                    rControl = L.Routing.control({
                        waypoints: pts,
                        router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                        lineOptions: { styles: [{color: '#2980b9', opacity: 0.8, weight: 6}] },
                        addWaypoints: false,
                        draggableWaypoints: false,
                        show: false
                    }).addTo(map);

                    var bounds = L.latLngBounds(pts);
                    map.fitBounds(bounds, { padding: [60, 60] });
                }
            }

            // 🚨 [오타 원천 차단] 기호 없는 순수 텍스트 안전 비교 로직
            function getFixedLocation(inputName) {
                if (!inputName) return null;
                var cleanName = inputName.toString().trim();
                if (cleanName === "") return null;

                for (var key in localDatabase) {
                    if (key.includes(cleanName) || cleanName.includes(key)) {
                        return localDatabase[key];
                    }
                }
                return null;
            }

            // 버튼 클릭 이벤트 바인딩 (타이밍 이슈 해결)
            setTimeout(function() {
                var btn = document.getElementById('search-route-btn');
                if (btn) {
                    btn.onclick = function(e) {
                        if(e && e.preventDefault) e.preventDefault();
                        
                        var sVal = document.getElementById('start-addr').value;
                        var eVal = document.getElementById('end-addr').value;
                        
                        if (!sVal || !eVal) {
                            alert('출발지와 도착지를 모두 입력해주세요!');
                            return false;
                        }
                        
                        var startLatLng = getFixedLocation(sVal);
                        var endLatLng = getFixedLocation(eVal);
                        
                        if (!startLatLng) {
                            alert('출발지 위치를 찾지 못했습니다. (미추홀구청, 인하대학교 등을 명확히 입력해 주세요)');
                            return false;
                        }
                        if (!endLatLng) {
                            alert('도착지 위치를 찾지 못했습니다. (미추홀구청, 인하대학교 등을 명확히 입력해 주세요)');
                            return false;
                        }
                        
                        pts = [startLatLng, endLatLng];
                        updateRoute();
                        return false;
                    };
                }
            }, 800);

            // 마우스 클릭 경로 탐색 연동
            map.on('click', function(e) {
                if (pts.length >= 2) { pts = []; if (rControl) map.removeControl(rControl); }
                pts.push(e.latlng);
                updateRoute();
            });
        }
    });
    </script>
