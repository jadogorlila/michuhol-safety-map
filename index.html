    <script>
    document.addEventListener("DOMContentLoaded", function() {
        var maps = [];
        for (var k in window) { if (k.startsWith("map_") && window[k] instanceof L.Map) maps.push(window[k]); }
        if (maps.length > 0) {
            var map = maps[0];
            var pts = [];
            var pressTimer = null;
            var currentMarkers = [];
            var routeLine = null; // 직선을 담을 변수

            // 우측 상단 가시성 높은 안내 상자 배치
            var infoBox = L.control({position: 'topright'});
            infoBox.onAdd = function() {
                var div = L.DomUtil.create('div', 'navigation-info-panel');
                div.id = 'nav-status-box';
                div.style.backgroundColor = 'white';
                div.style.padding = '12px';
                div.style.borderRadius = '8px';
                div.style.boxShadow = '0 2px 10px rgba(0,0,0,0.2)';
                div.style.fontFamily = 'Malgun Gothic, sans-serif';
                div.style.fontSize = '13px';
                div.style.lineHeight = '1.6';
                div.style.border = '2px solid #e67e22';
                div.innerHTML = '<b style="color:#e67e22; font-size:14px;">📍 내비게이션 안내</b><br/><span id="nav-msg" style="font-weight:bold; color:#2c3e50;">5초 동안 클릭하여 출발지 설정</span>';
                return div;
            };
            infoBox.addTo(map);

            function updateStatusUI() {
                var msgSpan = document.getElementById('nav-msg');
                if (!msgSpan) return;
                if (pts.length === 0) {
                    msgSpan.innerHTML = '5초 동안 클릭하여 출발지 설정';
                    msgSpan.style.color = '#2c3e50';
                } else if (pts.length === 1) {
                    msgSpan.innerHTML = '5초 동안 클릭하여 도착지 설정';
                    msgSpan.style.color = '#27ae60';
                } else {
                    msgSpan.innerHTML = '경로 탐색 완료! (지도 클릭 시 초기화)';
                    msgSpan.style.color = '#2980b9';
                }
            }

            // 5초 마우스 롱 프레스 트리거 로직
            map.on('mousedown', function(e) {
                // 이미 직선이 그려져 있는 상태에서 클릭하면 초기화
                if (pts.length >= 2) {
                    pts = [];
                    if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
                    currentMarkers.forEach(function(m) { map.removeLayer(m); });
                    currentMarkers = [];
                    updateStatusUI();
                    return;
                }

                pressTimer = setTimeout(function() {
                    var latlng = e.latlng;
                    pts.push(latlng);

                    var markerLabel = pts.length === 1 ? '출발지' : '도착지';
                    var newMarker = L.marker(latlng).addTo(map).bindPopup('<b>' + markerLabel + '</b>').openPopup();
                    currentMarkers.push(newMarker);

                    updateStatusUI();

                    // 출발지와 도착지가 모두 찍히면 하나의 선(Polyline)으로 연결
                    if (pts.length === 2) {
                        routeLine = L.polyline(pts, {
                            color: '#3498db',   // 선 색상 (파란색)
                            weight: 6,          // 선 두께
                            opacity: 0.8,       // 선 투명도
                            dashArray: '1, 1'   // 선 스타일 (필요시 '5, 5' 등으로 점선 변경 가능)
                        }).addTo(map);

                        // 두 지점이 한눈에 들어오도록 줌 맞춤
                        var bounds = L.latLngBounds(pts);
                        map.fitBounds(bounds, { padding: [50, 50] });
                    }
                }, 5000); // 정확히 5초
            });

            map.on('mouseup mousemove movestart zoomstart signallost', function() {
                if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
            });
        }
    });
    </script>
